# Saliuitl 論文再現実験
# 実行日: 2026-02-01
# 目的: Table 1 (Recovery Rate, Lost Prediction Rate) の再現検証

experiment:
  name: paper_reproduction
  date: 2026-02-01
  docker_image: saliuitl:latest

parameters:
  ensemble_step: 5
  inpainting_step: 5
  inpaint: biharmonic
  nn_det_threshold: 0.5

datasets:
  classification:
    - name: cifar
      attacks: [1p, 2p, 4p, trig]
      det_net_path: checkpoints/final_detection/2dcnn_raw_cifar_*_atk_det.pth  # 未提供
    - name: imagenet
      attacks: [1p, 2p, 4p, trig]
      det_net_path: checkpoints/final_detection/2dcnn_raw_imagenet_*_atk_det.pth  # 未提供

  object_detection:
    - name: inria
      attacks: [1p, 2p, trig]
      det_net_path: checkpoints/final_detection/2dcnn_raw_inria_*_atk_det.pth
    - name: voc
      attacks: [1p, 2p, trig, mo]
      det_net_path: checkpoints/final_detection/2dcnn_raw_VOC_*_atk_det.pth

notes:
  - CIFAR/ImageNet用のAttack Detectorチェックポイントは提供されていない
  - INRIA Multi-Objectのデータが欠落
  - effective_filesは各データセットディレクトリに配置済み
