# 復元画像可視化実験
# 実行日: 2026-02-02
# 目的: 攻撃画像と復元画像の可視化、復元プロセスの考察

experiment:
  name: recovery_visualization
  date: 2026-02-02
  docker_image: saliuitl:latest

parameters:
  ensemble_step: 5
  inpainting_step: 5
  inpaint: biharmonic
  nn_det_threshold: 0.5
  save_images: true
  save_images_limit: 10

datasets:
  - name: voc
    attack: 1p
    det_net_path: checkpoints/final_detection/2dcnn_raw_VOC_5_atk_det.pth
  - name: inria
    attack: 1p
    det_net_path: checkpoints/final_detection/2dcnn_raw_inria_5_atk_det.pth

outputs:
  figures: experiments/exp_20260202_recovery_viz/figures/
  logs: experiments/exp_20260202_recovery_viz/logs/

notes:
  - 復元画像の品質を視覚的に確認
  - 検出ボックスの変化を観察
  - 復元成功/失敗のパターンを分析
