services:
  # メインサービス（インタラクティブ用）
  saliuitl:
    build:
      context: .
      dockerfile: Dockerfile
    image: saliuitl:latest
    container_name: saliuitl

    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Mount volumes
    volumes:
      - .:/workspace
      - ./data:/workspace/data
      - ./weights:/workspace/weights
      - ./checkpoints:/workspace/checkpoints
      - ./experiments:/workspace/experiments

    # Keep container running
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /workspace

    # Environment variables
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0

  # Optional: Jupyter notebook service
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: saliuitl:latest
    container_name: saliuitl-jupyter

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    volumes:
      - .:/workspace

    ports:
      - "8888:8888"

    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''

    profiles:
      - jupyter

  # ワーカーサービス（並列タスク用）
  worker:
    image: saliuitl:latest

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    volumes:
      - .:/workspace

    working_dir: /workspace

    environment:
      - NVIDIA_VISIBLE_DEVICES=all

    # コマンドは起動時に指定
    entrypoint: ["python"]
